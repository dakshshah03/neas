exp:
  expname: abdomen_50_4m_hash
  expdir: ./checkpoints/
  datadir: ./data/abdomen_50.pickle
network:
  encoding_type: hash
  num_materials: 4
  feature_dim: 8
  multires: 6
  s_param: 20.0
  num_levels: 14
  level_dim: 2
  base_resolution: 16
  log2_hashmap_size: 19
  materials:
  - {alpha: 0.0605, beta: 0.0}
  - {alpha: 0.029, beta: 0.0605}
  - {alpha: 0.0, beta: 0.0894}
  - {alpha: 0.1012, beta: 0.0894}
train:
  epoch: 1000
  n_batch: 1
  n_rays: 512
  n_samples: 576
  val_n_samples: 128
  val_chunk_size: 1024
  lrate: 0.001
  lrate_gamma: 0.1
  lrate_step: 500
  lambda_reg: 0.01
  num_views: 50
  resume: false
  use_freq_reg: false
  tau_start: 2.0
  warmup_iters: 500
  lambda_mask: 0.1
  n_mask_rays: 128
log:
  i_eval: 50
  i_save: 50
  use_wandb: true
  wandb_project: neas_experimental
  wandb_entity: null
