exp:
  expname: brain_sim_1m_hash
  expdir: ./checkpoints/
  datadir: ./data/simulation_0/
  dataset_type: sim
network:
  encoding_type: hash
  num_materials: 1
  feature_dim: 8
  multires: 6
  s_param: 20.0
  num_levels: 14
  level_dim: 2
  base_resolution: 16
  log2_hashmap_size: 19
  materials:
  - {alpha: 10, beta: 0.1}
train:
  epoch: 1000
  n_batch: 1
  n_rays: 256
  n_samples: 192
  val_n_samples: 192
  val_chunk_size: 1024
  lrate: 0.0001
  lrate_gamma: 0.1
  lrate_step: 500
  lambda_reg: 0.01
  num_views: 60
  resume: false
  use_freq_reg: true
  tau_start: 2.0
  warmup_iters: 400
  lambda_mask: 0.1
  n_mask_rays: 64
  disable_3d_metrics: true
log:
  i_eval: 100
  i_save: 100
  use_wandb: true
  wandb_project: neas_brain
  wandb_entity: null
