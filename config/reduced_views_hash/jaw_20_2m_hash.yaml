exp:
  expname: jaw_20_2m_hash
  expdir: ./checkpoints/
  datadir: ./data/jaw_50.pickle
network:
  encoding_type: hash
  num_materials: 2
  feature_dim: 8
  multires: 6
  s_param: 20.0
  alpha1: 0.12
  beta1: 0.06
  alpha2: 0.82
  beta2: 0.18
  num_levels: 14
  level_dim: 2
  base_resolution: 16
  log2_hashmap_size: 19
train:
  epoch: 1000
  n_batch: 1
  n_rays: 512
  n_samples: 320
  val_n_samples: 128
  val_chunk_size: 1024
  lrate: 0.001
  lrate_gamma: 0.1
  lrate_step: 500
  lambda_reg: 0.01
  num_views: 20
  resume: false
  use_freq_reg: false
  tau_start: 2.0
  warmup_iters: 500
  lambda_mask: 0.1
  n_mask_rays: 128
log:
  i_eval: 50
  i_save: 50
  use_wandb: true
  wandb_project: neas
  wandb_entity: null
